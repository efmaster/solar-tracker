version: '3.8'
services:
  solar-tracker:
    image: ghcr.io/efmaster/solar-tracker:latest
    container_name: solartracker
    restart: unless-stopped
    
    ports:
      - "3117:3000"
    volumes:
      - /volume1/docker/solar-tracker:/data
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/data/dev.db